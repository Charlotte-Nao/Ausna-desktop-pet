<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚丝娜 AI 对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        #ai-dialog {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #ff6b9d;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.2);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .drag-handle {
            height: 24px;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2) 0%, rgba(255, 182, 193, 0.2) 100%);
            cursor: move;
            -webkit-app-region: drag;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 107, 157, 0.15);
            position: relative;
            z-index: 100;
        }
        
        .drag-handle::before {
            content: '•••';
            color: rgba(255, 107, 157, 0.5);
            font-size: 12px;
            letter-spacing: 1.5px;
        }

        .ai-input-area {
            width: 100%;
            height: 100%;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: stretch;
            background: transparent;
        }

        .ai-input {
            flex: 1;
            min-height: 70px;
            padding: 10px 14px;
            border: 2px solid #ff6b9d;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            font-family: inherit;
            transition: all 0.2s ease;
            background: white;
            box-shadow: 0 3px 10px rgba(255, 107, 157, 0.1) inset;
        }

        .ai-input:focus {
            outline: none;
            border-color: #ff4b8d;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.3);
        }

        .ai-send-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #ffb6c1 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            min-width: 60px;
            box-shadow: 0 3px 10px rgba(255, 107, 157, 0.3);
        }

        .ai-send-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ff5a8d 0%, #ffa8b5 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.4);
        }

        .ai-send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .ai-send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .close-btn {
            position: absolute;
            top: 2px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(255, 107, 157, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 101;
            opacity: 0.7;
            -webkit-app-region: no-drag;
        }

        .close-btn:hover {
            opacity: 1;
            background: rgba(255, 87, 137, 1);
            transform: scale(1.1);
        }

        .close-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
    <body>
    <div id="ai-dialog">
        <div class="drag-handle"></div>
        <div class="ai-input-area">
            <textarea id="ai-input" class="ai-input" placeholder="与亚丝娜对话...（Enter发送，Shift+Enter换行，ESC关闭）"></textarea>
            <button id="ai-send-btn" class="ai-send-btn">发送</button>
        </div>
        <button class="close-btn" id="close-btn" title="关闭">×</button>
    </div>

    <script src="ai/ai-service.js"></script>
    <script src="ai-window.js"></script>
</body>
</html>
