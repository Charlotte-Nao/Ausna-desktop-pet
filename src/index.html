<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuna 桌面宠物</title>
    <link rel="stylesheet" href="../resources/css/Live2D.css">
    <link rel="stylesheet" href="style.css">
    <script src="early-init.js"></script>
</head>
<body>
    <div id="container">
        <!-- 亚丝娜画布 - 调整width和height可改变亚丝娜大小 -->
        <canvas id="glcanvas" width="500" height="1000"></canvas>
        
        <!-- 气泡消息容器 - 样式在CSS中定义 -->
        <div id="speech-bubble" class="speech-bubble"></div>
        
        <div id="controls">
            <button class="control-btn" id="btn-close" title="关闭">×</button>
            <button class="control-btn" id="btn-minimize" title="最小化">_</button>
            <button class="control-btn" id="btn-pin" title="切换置顶">📌</button>
        </div>
        
        <div id="context-menu">
            <div class="menu-item" data-action="fortune">今日运势</div>
            <div class="menu-item" data-action="change-costume">切换服装</div>
            <div class="menu-separator"></div>
            <div class="menu-item" data-action="always-on-top">置顶窗口</div>
            <div class="menu-item" data-action="show-controls">显示控制按钮</div>
            <div class="menu-separator"></div>
            <div class="menu-item" data-action="exit">退出</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
