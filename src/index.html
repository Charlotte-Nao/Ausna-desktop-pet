<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuna 桌面宠物</title>
    <link rel="stylesheet" href="../resources/css/Live2D.css">
    
    <script>
        (function() {
            if (typeof require !== 'undefined') {
                const path = require('path');
                const fs = require('fs');
                window.__resourceRoot = 'file://' + path.resolve(__dirname, '..', 'resources').replace(/\\/g, '/');
                console.log('资源根路径:', window.__resourceRoot);
                
                try {
                    const jqueryPath = path.resolve(__dirname, '..', 'resources', 'js', 'jquery.min.js');
                    console.log('加载jQuery路径:', jqueryPath);
                    const jqueryContent = fs.readFileSync(jqueryPath, 'utf8');
                    eval(jqueryContent);
                    console.log('jQuery已通过fs加载, $:', typeof $);
                } catch (e) {
                    console.error('通过fs加载jQuery失败:', e);
                }
            }
        })();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        
        #container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: move;
            -webkit-app-region: drag;
        }
        
        #glcanvas {
            position: absolute;
            bottom: 0;
            right: 0;
            pointer-events: auto;
            z-index: 1000;
            will-change: transform;
            image-rendering: crisp-edges;
            -webkit-backface-visibility: hidden;
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            transform: translateZ(0) translateY(-150px); /* 调整translateY值可改变亚丝娜垂直位置 */
            -webkit-app-region: no-drag;
            
            /* 
            亚丝娜位置调整说明：
            1. 垂直位置：修改transform中的translateY值
               - 上移：负值（如translateY(-50px)）
               - 下移：正值（如translateY(50px)）
            2. 水平位置：可添加translateX值
               - 左移：负值（如translateX(-50px)）
               - 右移：正值（如translateX(50px)）
            3. 示例：同时调整水平和垂直位置
               transform: translateZ(0) translateX(-20px) translateY(-80px);
            4. 注意：translateZ(0)用于启用硬件加速，请勿删除
            */
        }
        
        #controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: none;
            z-index: 1001;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 6px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: controlsFadeIn 0.3s ease;
        }
        
        @keyframes controlsFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .control-btn {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.9) 0%, rgba(255, 182, 193, 0.9) 100%);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.3);
        }
        
        .control-btn:hover {
            background: linear-gradient(135deg, rgba(255, 87, 137, 1) 0%, rgba(255, 162, 173, 1) 100%);
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.5);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        #context-menu {
            position: absolute;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 249, 252, 0.98) 100%);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 16px;
            padding: 12px 0;
            box-shadow: 0 15px 50px rgba(255, 107, 157, 0.2), 0 5px 15px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1002;
            -webkit-app-region: no-drag;
            min-width: 240px;
            backdrop-filter: blur(25px);
            transform-origin: top left;
            animation: menuAppear 0.2s ease-out;
            overflow: hidden;
        }
        
        @keyframes menuAppear {
            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .menu-item {
            padding: 12px 20px 12px 45px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            white-space: nowrap;
            position: relative;
            transition: all 0.2s ease;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        
        .menu-item:hover {
            background: linear-gradient(90deg, rgba(255, 107, 157, 0.1) 0%, rgba(255, 182, 193, 0.05) 100%);
            color: #ff6b9d;
            padding-left: 50px;
        }
        
        .menu-item::before {
            content: '';
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #999;
            transition: color 0.2s ease;
        }
        
        .menu-item:hover::before {
            color: #ff6b9d;
        }
        
        /* 为每个菜单项添加图标 */
        .menu-item[data-action="fortune"]::before {
            content: '🔮';
        }
        
        .menu-item[data-action="change-costume"]::before {
            content: '👗';
        }
        
        .menu-item[data-action="always-on-top"]::before {
            content: '📌';
        }
        
        .menu-item[data-action="show-controls"]::before {
            content: '🎛️';
        }
        
        .menu-item[data-action="exit"]::before {
            content: '🚪';
        }
        
        .menu-separator {
            height: 1px;
            background: linear-gradient(90deg, transparent 10%, rgba(255, 107, 157, 0.2) 50%, transparent 90%);
            margin: 8px 20px;
            border: none;
        }
        
        /* 气泡浮动动画 - 使气泡有生动的不规则运动 */
        /* 使用不规则的关键帧创造更自然的浮动效果 */
        /* 现在气泡在X和Y方向都有轻微浮动，增强生动感 */
        /* 
        调整说明：
        1. X方向浮动：修改每个关键帧中 calc(-50% ± Xpx) 的X值
           - 增加X值范围扩大水平浮动幅度
           - 减小X值范围缩小水平浮动幅度
        2. Y方向浮动：修改每个关键帧中的 translateY(±Ypx) 值
           - 增加Y值范围扩大垂直浮动幅度  
           - 减小Y值范围缩小垂直浮动幅度
        3. 旋转：修改 rotate(±Zdeg) 值调整旋转角度
        4. 动画速度：修改 .speech-bubble.show 中的 animation-duration (6s)
        5. 动画曲线：修改 animation-timing-function (ease-in-out)
        */
        @keyframes bubbleFloat {
            0% {
                transform: translateX(calc(-50% + 0px)) translateY(0px) rotate(0.1deg);
            }
            12.5% {
                transform: translateX(calc(-50% - 7.5px)) translateY(-7.5px) rotate(-0.15deg);
            }
            25% {
                transform: translateX(calc(-50% - 10px)) translateY(-10px) rotate(0.2deg);
            }
            37.5% {
                transform: translateX(calc(-50% - 2.5px)) translateY(-2.5px) rotate(-0.1deg);
            }
            50% {
                transform: translateX(calc(-50% + 6px)) translateY(6px) rotate(0.25deg);
            }
            62.5% {
                transform: translateX(calc(-50% + 10px)) translateY(10px) rotate(-0.05deg);
            }
            75% {
                transform: translateX(calc(-50% + 4px)) translateY(4px) rotate(0.15deg);
            }
            87.5% {
                transform: translateX(calc(-50% - 5px)) translateY(-4px) rotate(-0.2deg);
            }
            100% {
                transform: translateX(calc(-50% + 0px)) translateY(0px) rotate(0.1deg);
            }
        }
        
        /* 气泡样式 - 调整大小和位置请修改以下属性 */
        .speech-bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #ff9900;
            border-radius: 20px;
            padding: 16px 28px;
            max-width: 520px;
            min-width: 300px;
            color: #333;
            font-size: 20px;
            font-weight: bold;

            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            z-index: 999;
            opacity: 0;
            left: 50%;
            top: 10px;
            transform: translateX(-50%) translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            -webkit-app-region: no-drag;
            text-align: center;
        }
        
        .speech-bubble.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            /* 气泡浮动动画 - 持续不规则运动使气泡更生动 */
            animation: bubbleFloat 6s ease-in-out infinite;
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: calc(50% - 10px);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #ff6b9d transparent transparent;
        }
        
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -7px;
            left: calc(50% - 10px);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- 亚丝娜画布 - 调整width和height可改变亚丝娜大小 -->
        <canvas id="glcanvas" width="500" height="1000"></canvas>
        
        <!-- 气泡消息容器 - 样式在CSS中定义 -->
        <div id="speech-bubble" class="speech-bubble"></div>
        
        <div id="controls">
            <button class="control-btn" id="btn-close" title="关闭">×</button>
            <button class="control-btn" id="btn-minimize" title="最小化">_</button>
            <button class="control-btn" id="btn-pin" title="切换置顶">📌</button>
        </div>
        
        <div id="context-menu">
            <div class="menu-item" data-action="fortune">今日运势</div>
            <div class="menu-item" data-action="change-costume">切换服装</div>
            <div class="menu-separator"></div>
            <div class="menu-item" data-action="always-on-top">置顶窗口</div>
            <div class="menu-item" data-action="show-controls">显示控制按钮</div>
            <div class="menu-separator"></div>
            <div class="menu-item" data-action="exit">退出</div>
        </div>
    </div>

    <script>
        (function() {
            console.log('动态脚本加载开始...');
            console.log('$ 已定义?', typeof $);
            
        // 拖拽状态跟踪变量 - 全局可访问
        window.lastDragEndTime = 0;
        
        // 控制按钮状态跟踪 - 全局可访问  
        window.controlsEnabled = false;
        
        console.log('全局变量初始化: lastDragEndTime =', window.lastDragEndTime, 'controlsEnabled =', window.controlsEnabled);
            
            if (typeof $ !== 'undefined') {
                console.log('jQuery 已加载，跳过加载');
                loadRemainingScripts();
                return;
            }
            
            const jquerySrc = window.__resourceRoot ? 
                window.__resourceRoot + '/js/jquery.min.js' : 
                '../resources/js/jquery.min.js';
            
            console.log('加载jQuery:', jquerySrc);
            
            const script = document.createElement('script');
            script.src = jquerySrc;
            script.onload = function() {
                console.log('jQuery加载成功, $:', typeof $);
                if (typeof $ !== 'undefined') {
                    console.log('jQuery版本:', $.fn.jquery);
                }
                loadRemainingScripts();
            };
            script.onerror = function(e) {
                console.error('jQuery加载失败:', e);
                setTimeout(() => {
                    console.log('尝试使用相对路径加载...');
                    const fallbackScript = document.createElement('script');
                    fallbackScript.src = '../resources/js/jquery.min.js';
                    fallbackScript.onload = function() {
                        console.log('jQuery回退加载成功');
                        loadRemainingScripts();
                    };
                    fallbackScript.onerror = function() {
                        console.error('jQuery回退加载也失败');
                        loadRemainingScripts();
                    };
                    document.head.appendChild(fallbackScript);
                }, 100);
            };
            
            function loadRemainingScripts() {
                const scripts = [
                    '../resources/js/live2d.min.js',
                    '../resources/js/live2d-helper.min.js',
                    '../resources/js/Live2D.js'
                ];
                
                function loadScript(index) {
                    if (index >= scripts.length) {
                        console.log('所有脚本加载完成');
                        initializeDesktopPetAfterLoad();
                        return;
                    }
                    
                    const src = scripts[index];
                    const s = document.createElement('script');
                    s.src = src;
                    s.onload = function() {
                        console.log('脚本加载成功:', src);
                        loadScript(index + 1);
                    };
                    s.onerror = function(e) {
                        console.error('脚本加载失败:', src, e);
                        loadScript(index + 1);
                    };
                    document.head.appendChild(s);
                }
                
                loadScript(0);
            }
            
            function initializeDesktopPetAfterLoad() {
                console.log('开始初始化桌面宠物...');
                console.log('检查全局变量: initializeDesktopPet =', typeof window.initializeDesktopPet, 'setupEventListeners =', typeof window.setupEventListeners);
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', function() {
                        console.log('DOMContentLoaded触发，再次检查全局变量');
                        if (window.initializeDesktopPet && window.setupEventListeners) {
                            console.log('调用initializeDesktopPet和setupEventListeners');
                            window.initializeDesktopPet();
                            window.setupEventListeners();
                        } else {
                            console.error('全局函数未定义: initializeDesktopPet =', !!window.initializeDesktopPet, 'setupEventListeners =', !!window.setupEventListeners);
                        }
                    });
                } else {
                    if (window.initializeDesktopPet && window.setupEventListeners) {
                        console.log('DOM已就绪，直接调用');
                        window.initializeDesktopPet();
                        window.setupEventListeners();
                    } else {
                        console.error('全局函数未定义: initializeDesktopPet =', !!window.initializeDesktopPet, 'setupEventListeners =', !!window.setupEventListeners);
                    }
                }
            }
            
            document.head.appendChild(script);
        })();
    </script>

    
    <script>
        const { ipcRenderer } = require('electron');
        

        
        // 初始化桌面宠物 - 加载Live2D模型和高级功能
        function initializeDesktopPet() {
            console.log('初始化桌面宠物...');
            window.currentCostume = '02';
            setTimeout(() => {
                console.log('加载Live2D模型 asuna_02');
                initLive2D('02');
                initAdvancedFeatures();
            }, 500);
        }
        window.initializeDesktopPet = initializeDesktopPet;

        // 设置事件监听器 - 处理拖拽、右键菜单、控制按钮等
        function setupEventListeners() {
            const container = document.getElementById('container');
            const canvas = document.getElementById('glcanvas');
            const contextMenu = document.getElementById('context-menu');
            const controls = document.getElementById('controls');
            
            // 初始化控制按钮显示状态
            controls.style.display = window.controlsEnabled ? 'flex' : 'none';
            updateContextMenuLabel('show-controls', window.controlsEnabled ? '隐藏控制按钮' : '显示控制按钮');
            console.log('控制按钮初始化: controlsEnabled =', window.controlsEnabled, 'display =', controls.style.display);
            
            let isDragging = false;
            let mouseDown = false;
            let dragStartX = 0;
            let dragStartY = 0;
            const DRAG_THRESHOLD = 5;
            
            container.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    mouseDown = true;
                    dragStartX = e.screenX;
                    dragStartY = e.screenY;
                } else if (e.button === 2) {
                    e.preventDefault();
                    showContextMenu(e.clientX, e.clientY);
                }
            });
            
            document.addEventListener('mousemove', (e) => {
                if (mouseDown && !isDragging) {
                    const deltaX = e.screenX - dragStartX;
                    const deltaY = e.screenY - dragStartY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    if (distance >= DRAG_THRESHOLD) {
                        isDragging = true;
                        console.log('开始拖拽，距离:', distance);
                    }
                }
                if (isDragging) {
                    const deltaX = e.screenX - dragStartX;
                    const deltaY = e.screenY - dragStartY;
                    
                    ipcRenderer.send('window-drag', { x: deltaX, y: deltaY });
                    
                    dragStartX = e.screenX;
                    dragStartY = e.screenY;
                }
            });
            
            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    window.lastDragEndTime = Date.now();
                    console.log('拖拽结束，设置最后拖拽时间:', window.lastDragEndTime);
                } else if (mouseDown) {
                    console.log('鼠标点击（未拖拽）');
                }
                isDragging = false;
                mouseDown = false;
            });
            
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });
            
            // 全局鼠标按下事件 - 检查点击是否在菜单外部
            document.addEventListener('mousedown', (e) => {
                const contextMenu = document.getElementById('context-menu');
                if (contextMenu.style.display === 'block') {
                    // 检查点击是否在菜单内部
                    const menuRect = contextMenu.getBoundingClientRect();
                    const isClickInsideMenu = 
                        e.clientX >= menuRect.left && e.clientX <= menuRect.right &&
                        e.clientY >= menuRect.top && e.clientY <= menuRect.bottom;
                    
                    // 如果点击在菜单外部，隐藏菜单
                    if (!isClickInsideMenu) {
                        hideContextMenu();
                    }
                }
            });
            
            // 窗口失去焦点时隐藏菜单
            window.addEventListener('blur', () => {
                hideContextMenu();
            });
            
            // 鼠标离开窗口时隐藏菜单
            window.addEventListener('mouseleave', () => {
                hideContextMenu();
            });
            

            
            document.getElementById('btn-close').addEventListener('click', () => {
                ipcRenderer.send('close-window');
            });
            
            document.getElementById('btn-minimize').addEventListener('click', () => {
                ipcRenderer.send('minimize-window');
            });
            
            document.getElementById('btn-pin').addEventListener('click', () => {
                ipcRenderer.send('toggle-always-on-top');
                const btn = document.getElementById('btn-pin');
                btn.textContent = btn.textContent === '📌' ? '📎' : '📌';
            });
            
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const action = e.target.getAttribute('data-action');
                    handleContextMenuAction(action);
                    hideContextMenu();
                });
            });
            
            container.addEventListener('mouseenter', () => {
                if (window.controlsEnabled) {
                    controls.style.display = 'flex';
                }
            });
            
            container.addEventListener('mouseleave', () => {
                if (window.controlsEnabled) {
                    controls.style.display = 'none';
                }
            });
        }
        window.setupEventListeners = setupEventListeners;

        // 显示右键菜单 - 参数x,y为菜单显示坐标
        function showContextMenu(x, y) {
            const contextMenu = document.getElementById('context-menu');
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
            contextMenu.style.display = 'block';
            console.log('显示右键菜单 at', x, y);
        }
        
        // 隐藏右键菜单
        function hideContextMenu() {
            const contextMenu = document.getElementById('context-menu');
            if (contextMenu.style.display === 'block') {
                console.log('隐藏右键菜单');
            }
            contextMenu.style.display = 'none';
        }
        
        // 处理右键菜单选项 - 根据action执行相应操作
        function handleContextMenuAction(action) {
            switch(action) {
                case 'fortune':
                    playFortune();
                    break;
                case 'change-costume':
                    changeCostume();
                    break;
                case 'always-on-top':
                    ipcRenderer.send('toggle-always-on-top');
                    break;
                case 'show-controls':
                    toggleControls();
                    break;
                case 'exit':
                    ipcRenderer.send('close-window');
                    break;
            }
        }
        
        // 播放运势占卜音频
        function playFortune() {
            console.log('播放运势占卜');
            playRandomAudio('fortune');
        }
        
        // 切换服装 - 循环切换01,02,03三个模型
        function changeCostume() {
            console.log('切换服装');
            const costumes = ['01', '02', '03'];
            const current = window.currentCostume || '02';
            let nextIndex = (costumes.indexOf(current) + 1) % costumes.length;
            const nextCostume = costumes[nextIndex];
            
            console.log('尝试切换服装到:', nextCostume);
            
            try {
                if (window.live2DHelper && window.initLive2D) {
                    window.live2DHelper = null;
                    initLive2D(nextCostume);
                    window.currentCostume = nextCostume;
                    showSpeechBubble(`切换服装: ${nextCostume}`, 2000);
                }
            } catch(e) {
                console.error('切换服装失败:', e);
                showSpeechBubble('切换失败，使用默认服装', 2000);
                initLive2D('02');
                window.currentCostume = '02';
            }
        }
        
        // 切换控制按钮显示/隐藏
        function toggleControls() {
            const controls = document.getElementById('controls');
            window.controlsEnabled = !window.controlsEnabled;
            
            if (window.controlsEnabled) {
                controls.style.display = 'flex';
                updateContextMenuLabel('show-controls', '隐藏控制按钮');
                console.log('控制按钮已启用');
            } else {
                controls.style.display = 'none';
                updateContextMenuLabel('show-controls', '显示控制按钮');
                console.log('控制按钮已禁用');
            }
        }
        
        // 更新右键菜单项标签
        function updateContextMenuLabel(action, label) {
            const menuItem = document.querySelector(`.menu-item[data-action="${action}"]`);
            if (menuItem) {
                menuItem.textContent = label;
            }
        }
        
        // 显示气泡消息 - text: 显示文本, duration: 显示时长(毫秒)
        // 气泡样式在CSS中定义，如需调整大小位置请修改 .speech-bubble 样式
        function showSpeechBubble(text, duration = 3000) {
            const bubble = document.getElementById('speech-bubble');
            bubble.textContent = text;
            bubble.classList.add('show');
            
            if (window.speechBubbleTimeout) {
                clearTimeout(window.speechBubbleTimeout);
            }
            
            window.speechBubbleTimeout = setTimeout(() => {
                bubble.classList.remove('show');
            }, duration);
        }

        // 播放随机音频 - type: 音频类型('interaction'或'fortune')
        function playRandomAudio(type = 'interaction') {
            try {
                // 停止之前播放的音频
                if (window.currentAudio) {
                    window.currentAudio.pause();
                    window.currentAudio.currentTime = 0;
                    window.currentAudio = null;
                }
                
                const fs = require('fs');
                const path = require('path');
                
                const audioPath = path.resolve(__dirname, '..', 'resources', 'audio', type);
                console.log('音频路径:', audioPath);
                
                if (!fs.existsSync(audioPath)) {
                    console.error('音频目录不存在:', audioPath);
                    return;
                }
                
                const files = fs.readdirSync(audioPath).filter(f => f.endsWith('.mp3'));
                console.log(`找到 ${files.length} 个音频文件 (${type}):`, files);
                
                if (files.length > 0) {
                    const randomFile = files[Math.floor(Math.random() * files.length)];
                    const filePath = path.join(audioPath, randomFile);
                    const audioUrl = 'file:///' + filePath.replace(/\\/g, '/');
                    
                    console.log('加载音频:', audioUrl);
                    const audio = new Audio(audioUrl);
                    audio.volume = 0.7;
                    
                    // 保存当前音频引用
                    window.currentAudio = audio;
                    
                    // 音频播放结束后清除引用
                    audio.onended = function() {
                        if (window.currentAudio === audio) {
                            window.currentAudio = null;
                        }
                    };
                    
                    audio.play().catch(e => console.log('音频播放失败:', e));
                    
                    const fileName = randomFile.replace('.mp3', '').replace('[亚丝娜]', '').trim();
                    
                    // 运势文本映射
                    if (type === 'fortune') {

                        // 对文件排序以确保一致的顺序
                        const sortedFiles = [...files].sort();
                        const fileIndex = sortedFiles.indexOf(randomFile);
                        let displayText;
                        if (fileIndex !== -1 && fileIndex < fortuneTexts.length) {
                            displayText = fortuneTexts[fileIndex];
                        } else {
                            // 如果找不到映射，使用文件名
                            displayText = fileName;
                        }
                        showSpeechBubble(displayText, 4000);
                    } else if (type !== 'interaction') {
                        // 对于非交互类型（如其他未来类型），显示文件名
                        showSpeechBubble(fileName, 4000);
                    }
                    
                    console.log('播放音频:', randomFile);
                } else {
                    console.log('未找到音频文件');
                    showSpeechBubble(type === 'fortune' ? fortuneTexts[Math.floor(Math.random() * fortuneTexts.length)] : '嗯？怎么了？', 3000);
                }
            } catch(e) {
                console.error('播放音频失败:', e);
                showSpeechBubble('音频加载失败', 2000);
            }
        }
        
        // 根据动作文件名获取在空组中的索引
        function getMotionIndex(motionName) {
            // 空组动作列表，顺序与 model.json 中的 motions[""] 一致
            const motionList = [
                'I_FUN', 'I_FUN_S', 'I_FUN_W',
                'I_SAD', 'I_SAD_S', 'I_SAD_W',
                'I_SNEESE',
                'I_SURPRISE', 'I_SURPRISE_S', 'I_SURPRISE_W',
                'REPEAT_01', 'REPEAT_02', 'REPEAT_03',
                'I_ANGRY', 'I_ANGRY_S', 'I_ANGRY_W'
            ];
            // 如果传入的是带 .mtn 后缀的文件名，去掉后缀
            const cleanName = motionName.replace('.mtn', '');
            const index = motionList.indexOf(cleanName);
            console.log(`查找动作索引: ${motionName} -> ${cleanName}, 索引: ${index}`);
            return index;
        }

        // 设置亚丝娜交互 - 点击画布不同部位触发不同反应
        function setupAsunaInteraction() {
            const canvas = document.getElementById('glcanvas');
            
            canvas.addEventListener('click', (e) => {
                console.log('Canvas点击事件触发');
                // 检查是否是拖拽后的点击（拖拽后100毫秒内的点击忽略）
                const now = Date.now();
                if (now - window.lastDragEndTime < 100) {
                    console.log('忽略拖拽后的点击，时间差:', now - window.lastDragEndTime, 'ms');
                    return;
                }
                
                // 检查右键菜单是否显示
                const contextMenu = document.getElementById('context-menu');
                if (contextMenu.style.display === 'block') {
                    // 如果菜单显示，点击画布则隐藏菜单
                    hideContextMenu();
                    return;
                }
                
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                console.log('Canvas点击位置:', x, y, '画布尺寸:', canvas.width, canvas.height);
                
                let part = 'body';
                if (y < 250) part = 'head';
                else if (y < 500) part = 'chest';
                else if (y < 900) part = 'body';
                else part = 'foot';
                
                interactWithAsuna(part);
            });
            
            console.log('亚丝娜交互已设置');
        }
        
        // 初始化高级功能 - 延迟设置交互和显示欢迎气泡
        function initAdvancedFeatures() {
            setTimeout(() => {
                setupAsunaInteraction();
                showSpeechBubble('亚丝娜上线啦~', 2000);
            }, 1000);

        window.interactWithAsuna = interactWithAsuna;
        window.showSpeechBubble = showSpeechBubble;
        window.playRandomAudio = playRandomAudio;
